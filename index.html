<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic Number Game</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .game-card {
      animation: fadeIn 0.8s ease-in-out;
      border-radius: 20px;
      background: white;
      color: #333;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shake {
      animation: shakeAnim 0.4s;
    }
    @keyframes shakeAnim {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }
  </style>
</head>

<body>

  <div class="game-card text-center">
    <h2 class="fw-bold mb-3">🎯 Magic Number Game</h2>
    <p>Guess the magic number between <b>1 to 100</b></p>

    <input
      id="guessInput"
      type="number"
      class="form-control text-center"
      placeholder="Enter your guess"
    />

    <button class="btn btn-primary mt-3 w-100" onclick="checkGuess()">
      🔍 Check
    </button>

    <p id="message" class="mt-3 fs-5 fw-bold"></p>
    <p id="attempts" class="text-muted"></p>

    <button id="restartBtn" class="btn btn-success mt-3 w-100 d-none" onclick="restartGame()">
      🔄 Play Again
    </button>
  </div>

  <script>
    let magicNumber = Math.floor(Math.random() * 100) + 1;
    let tries = 0;

    function checkGuess() {
      const inputBox = document.getElementById("guessInput");
      const message = document.getElementById("message");
      const attemptsBox = document.getElementById("attempts");
      const guess = Number(inputBox.value);

      if (!guess) {
        message.textContent = "⚠ Please enter a valid number!";
        inputBox.classList.add("shake");
        setTimeout(() => inputBox.classList.remove("shake"), 400);
        return;
      }

      tries++;

      if (guess === magicNumber) {
        message.textContent = "🎉 Correct! You found the magic number!";
        message.style.color = "green";
        document.getElementById("restartBtn").classList.remove("d-none");
      } else if (guess < magicNumber) {
        message.textContent = "📉 Too low! Try again.";
        message.style.color = "orange";
      } else {
        message.textContent = "📈 Too high! Try again.";
        message.style.color = "orange";
      }

      attemptsBox.textContent = `Attempts: ${tries}`;
    }

    function restartGame() {
      magicNumber = Math.floor(Math.random() * 100) + 1;
      tries = 0;

      document.getElementById("message").textContent = "";
      document.getElementById("attempts").textContent = "";
      document.getElementById("guessInput").value = "";
      document.getElementById("restartBtn").classList.add("d-none");
    }
  </script>

</body>
</html>
