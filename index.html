<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magic Number Game</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8f9fa;
    padding: 20px;
}
.card-box {
    perspective: 1000px;
    cursor: pointer;
}
.card-inner {
    position: relative;
    width: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}
.card-box.flipped .card-inner {
    transform: rotateY(180deg);
}
.card-face {
    position: absolute;
    width: 100%;
    backface-visibility: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 20px;
}
.front {
    background: white;
}
.back {
    background: #0d6efd;
    color: white;
    transform: rotateY(180deg);
}
</style>
</head>

<body>

<!-- 🔊 SOUND FILES -->
<audio id="flipSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_30c25597e0.mp3?filename=click-124467.mp3"></audio>
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f253a6548.mp3?filename=button-press-110151.mp3"></audio>
<audio id="resultSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1824f7ea61.mp3?filename=success-1-6297.mp3"></audio>

<div class="container text-center">
    <h2 class="mb-4">🔮 Magic Number Game</h2>
    <p class="lead">Think of a number between <b>1 to 100</b>.  
    Select <b>Yes</b> if your number appears on the card.</p>

    <div class="row" id="cards"></div>

    <h3 class="mt-4" id="result" style="display:none;"></h3>
</div>

<script>
// Card sets with hidden binary values
const cardsData = [
    { value: 1, numbers: generateNumbers(1) },
    { value: 2, numbers: generateNumbers(2) },
    { value: 4, numbers: generateNumbers(4) },
    { value: 8, numbers: generateNumbers(8) },
    { value: 16, numbers: generateNumbers(16) },
    { value: 32, numbers: generateNumbers(32) },
    { value: 64, numbers: generateNumbers(64) }
];

let total = 0;
let answeredCards = 0;
const cardsDiv = document.getElementById("cards");

// Sound references
const flipSound = document.getElementById("flipSound");
const clickSound = document.getElementById("clickSound");
const resultSound = document.getElementById("resultSound");

// Generate binary sets
function generateNumbers(bit) {
    let arr = [];
    for (let i = 1; i <= 100; i++) {
        if (i & bit) arr.push(i);
    }
    return arr;
}

// Build UI
cardsData.forEach((card, index) => {
    cardsDiv.innerHTML += `
        <div class="col-6 col-md-4 mt-3">
            <div class="card-box" id="card-${index}">
                <div class="card-inner">
                    <div class="card-face front">
                        <h4>Card ${index+1}</h4>
                        <p>${card.numbers.join(", ")}</p>
                        <button class="btn btn-success btn-sm" onclick="answer(${index}, 'yes')">Yes</button>
                        <button class="btn btn-danger btn-sm" onclick="answer(${index}, 'no')">No</button>
                    </div>
                    <div class="card-face back">
                        <h4>Answered ✔</h4>
                    </div>
                </div>
            </div>
        </div>
    `;
});

// Game logic
function answer(id, ans) {
    const card = cardsData[id];
    const box = document.getElementById(`card-${id}`);

    if (card.answered) return; // Prevent double clicks

    card.answered = true;
    clickSound.play();     // 🔊 Button click sound
    flipSound.play();      // 🔊 Card flip sound
    box.classList.add("flipped");

    if (ans === "yes") total += card.value;

    answeredCards++;

    if (answeredCards === cardsData.length) {
        showResult();
    }
}

function showResult() {
    resultSound.play(); // 🔊 Final reveal sound
    document.getElementById("result").innerHTML =
        `<b>Your number is: <span class="text-primary">${total}</span></b>`;
    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
