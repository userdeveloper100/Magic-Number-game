<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Number Cards</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #712cf9, #d63384);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card-box {
      background: white;
      color: #333;
      border-radius: 20px;
      padding: 25px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
      animation: fadeIn 0.6s ease;
    }

    .fade {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card-box text-center" id="gameBox">
    <h2 class="fw-bold">🎯 Magic Number Game</h2>
    <p>Think of a number between <b>1 to 100</b>. Don't say it!</p>

    <button class="btn btn-warning w-100 mt-3" onclick="startGame()">Start Magic ✨</button>
  </div>

  <script>
    // ===== 7 CARDS BASED ON BINARY POSITIONS =====
    const cards = [
      { value: 1,   numbers: [] },
      { value: 2,   numbers: [] },
      { value: 4,   numbers: [] },
      { value: 8,   numbers: [] },
      { value: 16,  numbers: [] },
      { value: 32,  numbers: [] },
      { value: 64,  numbers: [] }
    ];

    // Auto-generate card numbers (1–100)
    for (let n = 1; n <= 100; n++) {
      for (let i = 0; i < cards.length; i++) {
        if (n & cards[i].value) { 
          cards[i].numbers.push(n);
        }
      }
    }

    let currentCard = 0;
    let total = 0;

    function startGame() {
      currentCard = 0;
      total = 0;
      showCard();
    }

    function showCard() {
      const game = document.getElementById("gameBox");

      if (currentCard >= cards.length) {
        showFinal();
        return;
      }

      const cardData = cards[currentCard];
      const list = cardData.numbers.join(", ");

      game.innerHTML = `
        <h3 class="fw-bold">Card ${currentCard + 1}</h3>
        <p class="text-muted">Is your number in this card?</p>

        <div class="border p-3 rounded" style="max-height:150px; overflow-y:auto; background:#f8f9fa;">
          <p>${list}</p>
        </div>

        <div class="mt-4 d-flex gap-3">
          <button class="btn btn-success w-50" onclick="answerYes()">YES</button>
          <button class="btn btn-danger w-50" onclick="answerNo()">NO</button>
        </div>
      `;
    }

    function answerYes() {
      total += cards[currentCard].value;
      currentCard++;
      showCard();
    }

    function answerNo() {
      currentCard++;
      showCard();
    }

    function showFinal() {
      const game = document.getElementById("gameBox");
      game.innerHTML = `
        <h2 class="fw-bold text-success">🎉 Your Number Is</h2>
        <h1 class="display-1 fw-bold text-primary">${total}</h1>

        <button class="btn btn-secondary w-100 mt-4" onclick="startGame()">Play Again</button>
      `;
    }
  </script>

</body>
</html>
