<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Number Game</title>

  <style>
    body {
      background-color: #000;
      color: #00bfff;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      margin-top: 40px;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00bfff;
    }

    .welcome-box {
      margin-top: 40px;
      font-size: 20px;
      color: #9be3ff;
    }

    .btn {
      background: #00bfff;
      border: none;
      padding: 12px 28px;
      font-size: 18px;
      margin-top: 20px;
      color: black;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 10px #00bfff;
    }

    .btn:hover {
      background: #0099cc;
      box-shadow: 0 0 18px #00bfff;
    }

    /* Card Styling */
    .card-box {
      width: 90%;
      max-width: 380px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 14px;
      background: #0d0d0d;
      border: 1px solid #00bfff;
      box-shadow: 0 0 15px #00bfff66;
      min-height: 150px;
      max-height: 175px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease;
    }

    .card-box.show {
      opacity: 1;
      transform: translateY(0px);
    }

    .numbers {
      color: #9be3ff;
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.4;
    }

    /* Progress */
    .progress {
      margin-top: 20px;
      font-size: 18px;
      color: #77d9ff;
      text-shadow: 0 0 10px #00bfff;
    }

    /* Result */
    #resultBox {
      font-size: 28px;
      margin-top: 30px;
      color: #00eaff;
      text-shadow: 0 0 15px #00d5ff;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Welcome Screen -->
    <div id="welcomeScreen">
      <h1>🪄 Magic Number Game</h1>
      <p class="welcome-box">
        Think of a number between <b>1 to 100</b>.<br>
        I will show you 6 cards… <br>
        If your number appears on the card, click <b>YES</b>.
      </p>
      <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <!-- Game Screen -->
    <div id="gameBox" style="display:none;">
      <h1>Magic Number Game</h1>

      <div id="progress" class="progress"></div>

      <div id="cardContainer"></div>

      <button class="btn" onclick="handleYes()">YES</button>
      <button class="btn" onclick="handleNo()">NO</button>
    </div>

    <!-- Result Screen -->
    <div id="resultBox"></div>
    <button id="restartBtn" class="btn" style="display:none;" onclick="restart()">Restart</button>

  </div>

  <script>
    const cards = {
      1: [...Array(100).keys()].filter(n => (n + 1) & 1).map(n => n + 1),
      2: [...Array(100).keys()].filter(n => (n + 1) & 2).map(n => n + 1),
      4: [...Array(100).keys()].filter(n => (n + 1) & 4).map(n => n + 1),
      8: [...Array(100).keys()].filter(n => (n + 1) & 8).map(n => n + 1),
      16: [...Array(100).keys()].filter(n => (n + 1) & 16).map(n => n + 1),
      32: [...Array(100).keys()].filter(n => (n + 1) & 32).map(n => n + 1),
    };

    const cardKeys = Object.keys(cards).map(Number);
    let currentIndex = 0;
    let magicNumber = 0;

    function startGame() {
      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("gameBox").style.display = "block";
      showCard();
    }

    function showCard() {
      if (currentIndex >= cardKeys.length) return finishGame();

      const key = cardKeys[currentIndex];
      const list = cards[key];

      document.getElementById("progress").innerText = `Card ${currentIndex + 1} / 6`;

      const cardHTML = `
        <div class="card-box show">
          <b>Is your number in this card?</b>
          <p class="numbers">${list.join(", ")}</p>
        </div>
      `;

      const cardContainer = document.getElementById("cardContainer");
      cardContainer.innerHTML = cardHTML;

      setTimeout(() => {
        cardContainer.scrollIntoView({ behavior: "smooth" });
      }, 200);
    }

    function handleYes() {
      magicNumber += cardKeys[currentIndex];
      currentIndex++;
      showCard();
    }

    function handleNo() {
      currentIndex++;
      showCard();
    }

    function finishGame() {
      document.getElementById("gameBox").style.display = "none";
      const result = document.getElementById("resultBox");

      result.innerHTML = `🎉 Your Magic Number is <b>${magicNumber}</b>`;
      result.style.display = "block";

      document.getElementById("restartBtn").style.display = "inline-block";
    }

    function restart() {
      currentIndex = 0;
      magicNumber = 0;

      document.getElementById("resultBox").style.display = "none";
      document.getElementById("restartBtn").style.display = "none";

      document.getElementById("welcomeScreen").style.display = "block";
    }
  </script>

</body>
</html>
