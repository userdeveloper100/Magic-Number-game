<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Number Game</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .game-card {
      width: 380px;
      background: #fff;
      color: #000;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      padding: 25px;
      text-align: center;
    }

    /* Flip Animation */
    .flip-container {
      perspective: 1000px;
    }
    .flip-card {
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }
    .flip {
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <div class="game-card">
    <div class="flip-container">
      <div id="flipCard" class="flip-card">
        <div id="gameBox"></div>
      </div>
    </div>
  </div>

  <!-- Sounds -->
  <audio id="flipSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
  <audio id="successSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

  <script>
    const cards = [
      { value: 1, numbers: [] },
      { value: 2, numbers: [] },
      { value: 4, numbers: [] },
      { value: 8, numbers: [] },
      { value: 16, numbers: [] },
      { value: 32, numbers: [] },
      { value: 64, numbers: [] }
    ];

    for (let n = 1; n <= 100; n++) {
      cards.forEach((c) => {
        if (n & c.value) c.numbers.push(n);
      });
    }

    let cardIndex = 0;
    let total = 0;

    const flipSound = document.getElementById("flipSound");
    const successSound = document.getElementById("successSound");

    function flipCard() {
      const card = document.getElementById("flipCard");
      card.classList.add("flip");
      flipSound.play();
      setTimeout(() => card.classList.remove("flip"), 400);
    }

    function startGame() {
      cardIndex = 0;
      total = 0;
      showCard();
    }

    function showCard() {
      flipCard();

      const game = document.getElementById("gameBox");

      if (cardIndex >= cards.length) {
        successSound.play();
        return showFinal();
      }

      const cardData = cards[cardIndex];
      const list = cardData.numbers.join(", ");

      game.innerHTML = `
        <h2 class="fw-bold">Card ${cardIndex + 1}</h2>
        <p class="text-muted">Is your number here?</p>

        <div class="border p-3 rounded bg-light" style="max-height:150px; overflow-y:auto;">
          <p>${list}</p>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button class="btn btn-success w-50" onclick="yes()">YES</button>
          <button class="btn btn-danger w-50" onclick="no()">NO</button>
        </div>
      `;
    }

    function yes() {
      total += cards[cardIndex].value;
      cardIndex++;
      showCard();
    }

    function no() {
      cardIndex++;
      showCard();
    }

    function showFinal() {
      const game = document.getElementById("gameBox");

      game.innerHTML = `
        <h1 class="text-success fw-bold">🎉 Your Number</h1>
        <h1 class="display-1 fw-bold text-primary">${total}</h1>

        <button class="btn btn-secondary w-100 mt-4" onclick="startGame()">
          Play Again
        </button>
      `;
    }

    document.getElementById("gameBox").innerHTML = `
      <h2 class="fw-bold mb-3">🎯 Magic Number Game</h2>
      <p>Think of a number between <b>1 to 100</b>.</p>
      <button class="btn btn-warning w-100 mt-3" onclick="startGame()">Start Magic ✨</button>
    `;
  </script>
</body>
</html>
