<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Number Game (Corrected)</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f1f3f8;
  font-family: "Poppins", sans-serif;
  padding: 20px;
}

.card-container {
  perspective: 1000px;
}

.magic-card {
  width: 100%;
  border-radius: 14px;
  padding: 20px;
  background: white;
  box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}

.magic-card.flipped {
  transform: rotateY(180deg);
}

.magic-card.flipped > * {
  transform: rotateY(180deg);
}

.magic-card h2 {
  font-size: 26px;
  text-align: center;
  margin-bottom: 15px;
  font-weight: bold;
}

.number-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.number-box {
  padding: 8px;
  background: #007bff;
  color: white;
  font-weight: bold;
  border-radius: 6px;
  text-align: center;
}

#resultBox {
  font-size: 34px;
  font-weight: bold;
  padding: 25px;
  border-radius: 12px;
  background: white;
  text-align: center;
  margin-top: 25px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container text-center">
  <h1 class="mb-4">🔮 Magic Number Guessing Game</h1>

  <div id="gameArea"></div>

  <div id="resultArea" class="mt-4"></div>
</div>

<!-- Sounds -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
<audio id="flipSound" src="https://assets.mixkit.co/active_storage/sfx/2039/2039-preview.mp3"></audio>
<audio id="finalSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>
// ------------------------
// Binary Cards (Corrected)
// ------------------------
const cards = [
  { value: 1 },
  { value: 2 },
  { value: 4 },
  { value: 8 },
  { value: 16 },
  { value: 32 },
  { value: 64 }
];

let currentCard = 0;
let total = 0;

const gameArea = document.getElementById("gameArea");
const resultArea = document.getElementById("resultArea");

// Sounds
function playClick() { document.getElementById("clickSound").play(); }
function playFlip() { document.getElementById("flipSound").play(); }
function playFinal() { document.getElementById("finalSound").play(); }

// ------------------------
// Generate Numbers for Each Binary Card
// ------------------------
function generateCardNumbers(bitValue) {
  const arr = [];
  for (let i = 1; i <= 100; i++) {
    if (i & bitValue) arr.push(i);
  }
  return arr;
}

// ------------------------
// Display Card
// ------------------------
function showCard() {
  if (currentCard >= cards.length) {
    showFinal();
    return;
  }

  const bitValue = cards[currentCard].value;
  const nums = generateCardNumbers(bitValue);

  gameArea.innerHTML = `
    <div class="card-container">
      <div class="magic-card" id="magicCard">
        <h2>Card ${currentCard + 1}</h2>
        <div class="number-grid">
          ${nums.map(n => `<div class="number-box">${n}</div>`).join("")}
        </div>
      </div>
    </div>

    <div class="mt-4 d-flex justify-content-center gap-3">
      <button class="btn btn-success btn-lg" onclick="answerYes()">YES</button>
      <button class="btn btn-danger btn-lg" onclick="answerNo()">NO</button>
    </div>
  `;

  // flip animation
  setTimeout(() => {
    document.getElementById("magicCard").classList.add("flipped");
    playFlip();
  }, 100);
}

// YES clicked
function answerYes() {
  playClick();
  total += cards[currentCard].value;
  nextCard();
}

// NO clicked
function answerNo() {
  playClick();
  nextCard();
}

function nextCard() {
  currentCard++;
  showCard();
}

// ------------------------
// Final Result
// ------------------------
function showFinal() {
  gameArea.innerHTML = "";
  playFinal();

  resultArea.innerHTML = `
    <div id="resultBox">
      🎉 Your Number Is:<br><span style="color:#007bff">${total}</span>
    </div>
  `;
}

// Start the game
showCard();
</script>

</body>
</html>
